apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-api-config
  namespace: aiops
data:
  APP_ENV: prod
  LOG_LEVEL: info
  APP_PORT: "8080"
  APP_TIMEZONE: Asia/Shanghai
  HTTP_SERVER_WRITE_TIMEOUT_SECONDS: "300"
  KNOWLEDGE_DOCUMENT_PASS_SCORE: "70"
  DB_HOST: postgres.default.svc.cluster.local
  DB_PORT: "5432"
  DB_USER: aiops
  DB_NAME: aiops
  DB_SSLMODE: disable
  LOCAL_FILE_DIR: /app/data/uploads
  MAX_UPLOAD_BYTES: "52428800"
  RAG_CHUNK_SIZE: "800"
  RAG_CHUNK_OVERLAP: "100"
