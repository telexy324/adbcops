apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-api
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-api
    spec:
      containers:
        - name: api
          image: aiops-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: aiops-api-config
            - secretRef:
                name: aiops-api-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: aiops-uploads
